<!DOCTYPE html>
<html>
<head>
    <title>GC Modal Test Page</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>GC Modal Test Page</h1>
    <div id="status">Loading...</div>
    <div id="errors"></div>
    
    <script>
        // Capture any errors
        window.addEventListener('error', function(e) {
            document.getElementById('errors').innerHTML += '<p style="color:red">Error: ' + e.message + '</p>';
        });
        
        // Check before loading
        document.getElementById('status').innerHTML += '<p>Before load: GCModal = ' + (typeof window.GCModal) + '</p>';
    </script>
    
    <!-- Load GC Modal -->
    <script src="https://gcmodal.vercel.app/gc-modal.js?v=2.8.5-beta"></script>
    
    <script>
        // Check after loading
        document.getElementById('status').innerHTML += '<p>After load: GCModal = ' + (typeof window.GCModal) + '</p>';
        
        if (window.GCModal) {
            document.getElementById('status').innerHTML += '<p>GCModal.version = ' + (GCModal.version || 'undefined') + '</p>';
            document.getElementById('status').innerHTML += '<p>GCModal.init = ' + (typeof GCModal.init) + '</p>';
            document.getElementById('status').innerHTML += '<p>GCModal.initUniversal = ' + (typeof GCModal.initUniversal) + '</p>';
            document.getElementById('status').innerHTML += '<p>GCModal functions: ' + Object.keys(GCModal).join(', ') + '</p>';
            
            // Try to initialize
            try {
                GCModal.initUniversal({ apiUrl: 'https://gcmodal-api.vercel.app' });
                document.getElementById('status').innerHTML += '<p style="color:green">initUniversal() called successfully!</p>';
            } catch(e) {
                document.getElementById('errors').innerHTML += '<p style="color:red">initUniversal error: ' + e.message + '</p>';
            }
        } else {
            document.getElementById('errors').innerHTML += '<p style="color:red">GCModal object not found!</p>';
        }
    </script>
</body>
</html>
